<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD-POS Login</title>
  <link rel="icon" type="image/png" href="https://files.catbox.moe/w09oor.JPG">
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <style>
    .login-page {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0c10;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .login-card {
      background: #111418;
      border-radius: 28px;
      width: 380px;
      padding: 32px 28px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .login-card h2 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub { color: #8e9aaf; margin-bottom: 28px; font-size: 14px; }
    .input-group { margin-bottom: 18px; }
    .input-group label {
      display: block; font-size: 13px;
      margin-bottom: 6px; color: #cdd9f4;
    }
    .input-group input {
      width: 100%;
      background: #1e2229;
      border: 1px solid #2d323c;
      padding: 12px 14px;
      border-radius: 16px;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }
    .input-group input:focus { outline: none; border-color: #7c3aed; }
    .btn-login {
      background: #7c3aed;
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 12px;
      border: none;
      cursor: pointer;
      color: white;
      font-size: 15px;
      transition: background .2s;
    }
    .btn-login:hover { background: #6d28d9; }
    .btn-login:disabled { background: #4b2d8a; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,0.2);
      color: #f87171;
      padding: 8px 12px;
      border-radius: 40px;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h2>SD-POS</h2>
      <div class="sub">Next-Gen Point of Sale · Secure Login</div>
      <div id="login-error" class="error-msg" style="display:none;"></div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="login-username" autocomplete="off" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-password" />
      </div>
      <button id="btn-login" class="btn-login">🔐 Login</button>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    async function doLogin() {
      const username = $('login-username').value.trim();
      const password = $('login-password').value;
      const errorDiv = $('login-error');
      const btn      = $('btn-login');

      if (!username || !password) {
        errorDiv.textContent = '⚠️ Please enter username and password';
        errorDiv.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errorDiv.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.ok) {
          sessionStorage.setItem('pos_logged_in', data.user.username);
          sessionStorage.setItem('pos_user', JSON.stringify(data.user));
          window.location.replace('/');
        } else {
          errorDiv.textContent = '❌ ' + (data.error || 'Invalid credentials');
          errorDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '🔐 Login';
        }
      } catch (e) {
        errorDiv.textContent = '❌ Connection error. Try again.';
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '🔐 Login';
      }
    }

    $('btn-login').addEventListener('click', doLogin);
    $('login-password').addEventListener('keypress', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
